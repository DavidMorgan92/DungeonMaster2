<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Master</title>
  <link href="style.css" rel="stylesheet">
</head>

<body>
  <img id="background" src="test.jpg" hidden>
  <img id="move-icon" src="move.png" hidden>
  <img id="rotate-icon" src="rotate.png" hidden>

  <div id="drawer">
    <h1>Dungeon Master</h1>

    <h2>Heroes</h2>
    <select id="heroes" size="5">
      <option value="hero1">Hero 1</option>
      <option value="hero2">Hero 2</option>
      <option value="hero3">Hero 3</option>
      <option value="hero4">Hero 4</option>
      <option value="hero5">Hero 5</option>
    </select>
    <div id="hero-controls">
      <button id="add-hero">Add Hero</button>
      <button id="remove-hero">Remove Hero</button>
    </div>

    <h2>Sight Blockers</h2>
    <button id="add-sight-blocker">Add Sight Blocker</button>
    <button id="delete-selected-sight-blocker">Delete Selected Sight Blocker</button>
    <div>
      <input id="edit-sight-blockers" type="checkbox" checked>
      <label for="edit-sight-blockers">Edit Sight Blockers</label>
    </div>
  </div>

  <div id="main-canvas-container">
    <canvas id="main-canvas"></canvas>
  </div>

  <script src="background-renderer.js"></script>
  <script src="canvas-manager.js"></script>
  <script src="compositor.js"></script>
  <script src="coordinate-utils.js"></script>
  <script src="mouse-handler.js"></script>
  <script src="sight-blocker.js"></script>
  <script src="sight-provider.js"></script>
  <script src="room-editor.js"></script>

  <script>
    const sightProviders = []
    const sightBlockers = [
      new SightBlocker(200, 200, 100, 100, 20),
      new SightBlocker(400, 300, 150, 150, 45),
    ]

    const mainCanvas = document.getElementById('main-canvas')
    const background = document.getElementById('background')

    const { canvasManager, mouseHandler } = initCanvas(mainCanvas, background, sightProviders, sightBlockers)

    const moveIcon = document.getElementById('move-icon')
    const rotateIcon = document.getElementById('rotate-icon')

    const roomEditor = new RoomEditor(canvasManager, moveIcon, rotateIcon, mouseHandler)

    const editSightBlockersCheckbox = document.getElementById('edit-sight-blockers')
    editSightBlockersCheckbox.addEventListener('change', (event) => {
      roomEditor.toggleEditSightBlockers(event.target.checked)
    })

    editSightBlockersCheckbox.dispatchEvent(new Event('change'))

    document.getElementById('add-sight-blocker').addEventListener('click', () => {
      roomEditor.startAddingSightBlocker()
    })

    document.getElementById('delete-selected-sight-blocker').addEventListener('click', () => {
      roomEditor.deleteSelectedSightBlocker()
    })
  </script>
</body>

</html>
