<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Master</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
</head>

<body>
  <img id="background" src="test.jpg" hidden>
  <img id="move-icon" src="move.png" hidden>
  <img id="rotate-icon" src="rotate.png" hidden>

  <button id="open-close-drawer">🞀</button>

  <div id="drawer">
    <h1>Dungeon Master</h1>

    <h2>Room</h2>
    <button id="load-room">Load Room</button>
    <button id="save-room">Save Room</button>

    <h2>Heroes</h2>
    <select id="heroes" size="5"></select>
    <div id="hero-controls">
      <button id="add-hero">Add Hero</button>
      <button id="remove-hero">Remove Hero</button>
    </div>
    <input id="hero-name" type="text">

    <h2>Sight Blockers</h2>
    <div>
      <input id="edit-sight-blockers" type="checkbox" checked>
      <label for="edit-sight-blockers">Edit Sight Blockers</label>
    </div>
    <button id="add-sight-blocker">Add Sight Blocker</button>
    <button id="delete-selected-sight-blocker">Delete Selected Sight Blocker</button>

    <h2>Background</h2>
    <button id="change-background">Change Background</button>
  </div>

  <div id="main-canvas-container">
    <canvas id="main-canvas"></canvas>
  </div>

  <script src="background-renderer.js"></script>
  <script src="canvas-manager.js"></script>
  <script src="compositor.js"></script>
  <script src="coordinate-utils.js"></script>
  <script src="mouse-handler.js"></script>
  <script src="sight-blocker.js"></script>
  <script src="sight-provider.js"></script>
  <script src="room-editor.js"></script>
  <script src="background-image-loader.js"></script>
  <script src="hero.js"></script>
  <script src="room-serializer.js"></script>
  <script src="init.js"></script>
</body>

</html>
