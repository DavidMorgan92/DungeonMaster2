<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Master</title>

  <style>
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: row;
    }

    #drawer {
      flex-shrink: 0;
      width: 200px;
      background-color: lightgray;
    }

    #main-canvas-container {
      flex: 1;
      display: flex;
    }

    #main-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <img id="background" src="test.jpg" hidden>
    
  <div id="drawer"></div>

  <div id="main-canvas-container">
    <canvas id="main-canvas"></canvas>
  </div>

  <script src="background-renderer.js"></script>
  <script src="canvas-manager.js"></script>
  <script src="compositor.js"></script>
  <script src="mouse-handler.js"></script>
  <script src="sight-blocker.js"></script>
  <script src="sight-provider.js"></script>

  <script>
    const mainCanvas = document.getElementById('main-canvas')
    const background = document.getElementById('background')

    const sightProviders = []
    const sightBlockers = []

    initCanvas()

    function initCanvas() {
      const backgroundRenderer = new BackgroundRenderer(background)
      const compositor = new Compositor(backgroundRenderer, sightProviders, sightBlockers)
      const mainCanvasManager = new CanvasManager(mainCanvas, compositor)
      const mouseHandler = new MouseHandler(mainCanvas,
        (offsetX, offsetY) => mainCanvasManager.updateOffset(offsetX, offsetY),
        newScaleFactor => mainCanvasManager.updateScaleFactor(newScaleFactor),
        () => mainCanvasManager.getOffset(),
        () => mainCanvasManager.getScaleFactor())
    }
  </script>
</body>

</html>
