<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Master</title>

  <style>
    body {
      display: flex;
      margin: 0;
      padding: 0;
      height: 100vh;
    }

    #main-canvas {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <img id="background" src="test.jpg" hidden>

  <canvas id="main-canvas"></canvas>

  <script>
    class SightProvider {
      constructor(x, y, radius) {
        this.x = x
        this.y = y
        this.radius = radius

        this.canvas = document.createElement('canvas')
        this.canvas.width = this.radius * 2
        this.canvas.height = this.radius * 2

        this.ctx = this.canvas.getContext('2d')
        this.ctx.fillStyle = 'white'
      }

      render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height)
        this.ctx.beginPath()
        this.ctx.arc(this.radius, this.radius, this.radius, 0, Math.PI * 2)
        this.ctx.fill()
      }
    }

    class BackgroundRenderer {
      constructor(image) {
        this.image = image
      }

      render(ctx, offsetX, offsetY, scaleFactor) {
        ctx.drawImage(this.image, offsetX, offsetY, this.image.naturalWidth * scaleFactor, this.image.naturalHeight * scaleFactor)
      }
    }

    class Compositor {
      constructor(canvas, backgroundRenderer, sightProviders) {
        this.canvas = canvas
        this.ctx = canvas.getContext('2d')
        this.backgroundRenderer = backgroundRenderer
        this.sightProviders = sightProviders
      }

      render(offsetX, offsetY, scaleFactor) {
        this.ctx.fillStyle = 'lightgray'
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height)

        this.backgroundRenderer.render(this.ctx, offsetX, offsetY, scaleFactor)

        for (const provider of this.sightProviders) {
          provider.render()

          this.ctx.drawImage(provider.canvas,
            (provider.x - provider.radius) * scaleFactor + offsetX,
            (provider.y - provider.radius) * scaleFactor + offsetY,
            provider.radius * 2 * scaleFactor,
            provider.radius * 2 * scaleFactor)
        }
      }
    }

    class CanvasManager {
      constructor(canvas, compositor) {
        this.canvas = canvas

        this.offsetX = 0
        this.offsetY = 0
        this.scaleFactor = 1.0

        window.addEventListener('resize', () => this.handleResize())
        this.handleResize()
      }

      handleResize() {
        const rect = this.canvas.parentElement.getBoundingClientRect()
        this.canvas.width = rect.width
        this.canvas.height = rect.height
        this.scheduleRender()
      }

      scheduleRender() {
        if (this.renderScheduled)
          return

        this.renderScheduled = true

        requestAnimationFrame(() => {
          this.renderScheduled = false
          compositor.render(this.offsetX, this.offsetY, this.scaleFactor)
        })
      }

      updateOffset(newOffsetX, newOffsetY) {
        this.offsetX = newOffsetX
        this.offsetY = newOffsetY
        this.scheduleRender()
      }

      updateScaleFactor(newScaleFactor) {
        this.scaleFactor = newScaleFactor
        this.scheduleRender()
      }

      getOffset() {
        return { x: this.offsetX, y: this.offsetY }
      }

      getScaleFactor() {
        return this.scaleFactor
      }
    }

    class MouseHandler {
      constructor(canvas, updateOffset, updateScaleFactor, getOffset, getScaleFactor) {
        this.canvas = canvas
        this.updateOffset = updateOffset
        this.updateScaleFactor = updateScaleFactor
        this.getOffset = getOffset
        this.getScaleFactor = getScaleFactor

        this.dragging = false
        this.lastMouseX = undefined
        this.lastMouseY = undefined
        this.mouseDeltaX = 0
        this.mouseDeltaY = 0

        this.canvas.addEventListener('mousedown', () => this.handleMouseDown())
        this.canvas.addEventListener('mouseup', () => this.handleMouseUp())
        this.canvas.addEventListener('mousemove', event => this.handleMouseMove(event))
        this.canvas.addEventListener('wheel', event => this.handleWheel(event), { passive: false })
      }

      handleMouseDown() {
        this.dragging = true
      }

      handleMouseUp() {
        this.dragging = false
      }

      handleMouseMove(event) {
        if (this.lastMouseX === undefined) {
          this.lastMouseX = event.offsetX
          this.lastMouseY = event.offsetY
        }

        this.mouseDeltaX = event.offsetX - this.lastMouseX
        this.mouseDeltaY = event.offsetY - this.lastMouseY

        this.lastMouseX = event.offsetX
        this.lastMouseY = event.offsetY

        if (this.dragging) {
          const offset = this.getOffset()
          this.updateOffset(offset.x + this.mouseDeltaX, offset.y + this.mouseDeltaY)
        }
      }

      handleWheel(event) {
        event.preventDefault()
        const prevScale = this.getScaleFactor()
        const zoomIntensity = 0.0015
        const delta = -event.deltaY

        const newScale = Math.min(Math.max(prevScale * (1 + delta * zoomIntensity), 1.0), 10.0)

        const px = event.offsetX
        const py = event.offsetY

        const offset = this.getOffset()

        this.updateOffset(px - ((px - offset.x) / prevScale) * newScale, py - ((py - offset.y) / prevScale) * newScale)
        this.updateScaleFactor(newScale)
      }
    }

    const sightProviders = [
      new SightProvider(400, 300, 150),
      new SightProvider(600, 500, 100),
    ]

    const mainCanvas = document.getElementById('main-canvas')
    const background = document.getElementById('background')

    const backgroundRenderer = new BackgroundRenderer(background)
    const compositor = new Compositor(mainCanvas, backgroundRenderer, sightProviders)
    const mainCanvasManager = new CanvasManager(mainCanvas, compositor)
    const mouseHandler = new MouseHandler(mainCanvas,
      (offsetX, offsetY) => mainCanvasManager.updateOffset(offsetX, offsetY),
      newScaleFactor => mainCanvasManager.updateScaleFactor(newScaleFactor),
      () => mainCanvasManager.getOffset(),
      () => mainCanvasManager.getScaleFactor())
  </script>
</body>

</html>
